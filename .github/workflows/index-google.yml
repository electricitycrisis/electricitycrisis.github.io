name: Google Indexing Trigger

on:
  workflow_run:
    workflows: ["Build and Deploy to GitHub Pages"]
    types:
      - completed

jobs:
  notify-google:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

      - name: Notify Google Indexing API
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_INDEXING_JSON }}
        run: |
          python3 scripts/google_index.py
